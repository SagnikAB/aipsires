<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Analyzer</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="{{ url_for('static', filename='theme.js') }}" defer></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav>
  <div class="logo">
    <h2>AI Resume Analyzer</h2>
    <span class="badge">AI Powered</span>
  </div>

  <div class="links">
    <a href="/history">History</a>
    <button class="theme-btn" onclick="toggleTheme()">🌗</button>
  </div>
</nav>

<!-- ================= HERO ================= -->
<section class="hero">

  <h1>Analyze Your Resume with AI 🚀</h1>
  <p>
    Get instant scoring, keyword detection, and recruiter insights in seconds.
  </p>

  <!-- ================= UPLOAD CARD ================= -->
  <form action="/analyze" method="POST" enctype="multipart/form-data" class="upload-card">

    <label for="fileInput" class="upload-box">
      <input type="file" name="resume" id="fileInput" hidden required>

      <div class="upload-content">
        <h3>📂 Drag & Drop Resume</h3>
        <p>or click to browse (PDF recommended)</p>
      </div>
    </label>

    <button type="submit" class="primary-btn">Analyze Resume</button>

  </form>

  <!-- FEATURES -->
  <div class="features">
    <span>⚡ Instant AI Scoring</span>
    <span>🎯 Skill Matching</span>
    <span>📊 Detailed Breakdown</span>
  </div>

</section>

<footer>
  © 2026 Sagnik Dam | Built with Flask & AI
</footer>

</body>
</html>
